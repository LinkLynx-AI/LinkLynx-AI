name: Infra Deploy (prod)

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Run terraform plan or apply"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      rust_api_image_digest:
        description: "Optional Rust API image digest override"
        required: false
        type: string
      confirm_production_apply:
        description: "Type prod to allow apply"
        required: false
        type: string

concurrency:
  group: infra-prod-deploy
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_WORKING_DIRECTORY: infra/environments/prod
  TARGET_ENV: prod
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_TERRAFORM_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_DEPLOYER_SERVICE_ACCOUNT }}
  GCP_TERRAFORM_ADMIN_SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_TERRAFORM_ADMIN_SERVICE_ACCOUNT_EMAIL }}
  GCP_TERRAFORM_STATE_BUCKET: ${{ vars.GCP_TERRAFORM_STATE_BUCKET }}
  GCP_TERRAFORM_STATE_PREFIX: ${{ vars.GCP_TERRAFORM_STATE_PREFIX_PROD || 'env/prod' }}

jobs:
  plan:
    name: Terraform Plan (prod)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_terraform_admin_service_account_email: ${{ env.GCP_TERRAFORM_ADMIN_SERVICE_ACCOUNT_EMAIL }}
      INFRA_PROD_TERRAFORM_TFVARS: ${{ secrets.INFRA_PROD_TERRAFORM_TFVARS }}
      RUST_API_IMAGE_DIGEST_OVERRIDE: ${{ inputs.rust_api_image_digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow settings
        run: |
          set -euo pipefail

          for variable_name in \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_TERRAFORM_DEPLOYER_SERVICE_ACCOUNT \
            GCP_TERRAFORM_ADMIN_SERVICE_ACCOUNT_EMAIL \
            GCP_TERRAFORM_STATE_BUCKET
          do
            if [ -z "${!variable_name:-}" ]; then
              echo "::error::${variable_name} is required." >&2
              exit 1
            fi
          done

          if [ -z "${INFRA_PROD_TERRAFORM_TFVARS:-}" ]; then
            echo "::error::INFRA_PROD_TERRAFORM_TFVARS is required." >&2
            exit 1
          fi

          if [ "${{ inputs.operation }}" = "apply" ] && [ "${{ inputs.confirm_production_apply }}" != "prod" ]; then
            echo "::error::confirm_production_apply must be 'prod' when operation=apply." >&2
            exit 1
          fi

      - name: Resolve Terraform version
        run: echo "TERRAFORM_VERSION=$(cat .terraform-version)" >> "${GITHUB_ENV}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_TERRAFORM_DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Prepare backend config
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: |
          set -euo pipefail
          cat <<EOF > backend.hcl
          bucket = "${GCP_TERRAFORM_STATE_BUCKET}"
          prefix = "${GCP_TERRAFORM_STATE_PREFIX}"
          EOF

      - name: Prepare tfvars override
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: |
          set -euo pipefail

          printf '%s\n' "${INFRA_PROD_TERRAFORM_TFVARS}" > github-actions.auto.tfvars

          if [ -n "${RUST_API_IMAGE_DIGEST_OVERRIDE:-}" ]; then
            printf '\nrust_api_image_digest = "%s"\n' "${RUST_API_IMAGE_DIGEST_OVERRIDE}" >> github-actions.auto.tfvars
          fi

      - name: Terraform format check
        run: terraform fmt -check -recursive infra

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Render plan text
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-terraform-plan
          path: |
            ${{ env.TERRAFORM_WORKING_DIRECTORY }}/tfplan
            ${{ env.TERRAFORM_WORKING_DIRECTORY }}/tfplan.txt

      - name: Append plan summary
        run: |
          {
            echo "### Terraform plan (prod)"
            echo ""
            echo "- operation: \`${{ inputs.operation }}\`"
            echo "- ref: \`${GITHUB_REF_NAME}\`"
            echo "- working directory: \`${TERRAFORM_WORKING_DIRECTORY}\`"
            if [ -n "${RUST_API_IMAGE_DIGEST_OVERRIDE:-}" ]; then
              echo "- rust image digest override: \`${RUST_API_IMAGE_DIGEST_OVERRIDE}\`"
            else
              echo "- rust image digest override: none"
            fi
            echo ""
            echo "Plan text is uploaded as the \`prod-terraform-plan\` artifact."
          } >> "${GITHUB_STEP_SUMMARY}"

  apply:
    name: Terraform Apply (prod)
    if: ${{ inputs.operation == 'apply' }}
    needs: plan
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_terraform_admin_service_account_email: ${{ env.GCP_TERRAFORM_ADMIN_SERVICE_ACCOUNT_EMAIL }}
      INFRA_PROD_TERRAFORM_TFVARS: ${{ secrets.INFRA_PROD_TERRAFORM_TFVARS }}
      RUST_API_IMAGE_DIGEST_OVERRIDE: ${{ inputs.rust_api_image_digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard apply branch
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Terraform apply for prod must run from main." >&2
            exit 1
          fi

      - name: Resolve Terraform version
        run: echo "TERRAFORM_VERSION=$(cat .terraform-version)" >> "${GITHUB_ENV}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_TERRAFORM_DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Prepare backend config
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: |
          set -euo pipefail
          cat <<EOF > backend.hcl
          bucket = "${GCP_TERRAFORM_STATE_BUCKET}"
          prefix = "${GCP_TERRAFORM_STATE_PREFIX}"
          EOF

      - name: Prepare tfvars override
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: |
          set -euo pipefail

          printf '%s\n' "${INFRA_PROD_TERRAFORM_TFVARS}" > github-actions.auto.tfvars

          if [ -n "${RUST_API_IMAGE_DIGEST_OVERRIDE:-}" ]; then
            printf '\nrust_api_image_digest = "%s"\n' "${RUST_API_IMAGE_DIGEST_OVERRIDE}" >> github-actions.auto.tfvars
          fi

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-terraform-plan
          path: ${{ env.TERRAFORM_WORKING_DIRECTORY }}

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform apply
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: terraform apply -input=false tfplan

      - name: Capture terraform outputs
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
        run: terraform output -no-color > terraform-output.txt

      - name: Upload apply outputs
        uses: actions/upload-artifact@v4
        with:
          name: prod-terraform-outputs
          path: ${{ env.TERRAFORM_WORKING_DIRECTORY }}/terraform-output.txt

      - name: Append apply summary
        run: |
          {
            echo "### Terraform apply (prod)"
            echo ""
            echo "- ref: \`${GITHUB_REF_NAME}\`"
            echo "- working directory: \`${TERRAFORM_WORKING_DIRECTORY}\`"
            echo "- environment approval: \`prod\`"
            echo "- outputs artifact: \`prod-terraform-outputs\`"
          } >> "${GITHUB_STEP_SUMMARY}"
