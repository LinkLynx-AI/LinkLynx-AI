name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-smoke:
    name: Build and Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images for smoke test
        run: docker compose build rust typescript
      - name: Start services for smoke test
        run: docker compose up -d postgres rust
      - name: Wait for /health endpoint
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 3
          done
          echo "Smoke test failed: /health did not respond" >&2
          docker compose logs rust >&2
          exit 1
      - name: Stop services
        if: always()
        run: docker compose down

  deploy:
    name: Deploy (Placeholder)
    runs-on: ubuntu-latest
    needs: build-and-smoke
    steps:
      - name: Placeholder deploy step
        run: echo "Deploy step is not connected yet. Build + Smoke completed."
