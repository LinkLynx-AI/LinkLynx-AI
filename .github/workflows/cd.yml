name: CD

on:
  push:
    branches:
      - main

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Rust image
        run: docker build -t linklynx-rust:ci ./rust
      - name: Build TypeScript image
        run: docker build -t linklynx-typescript:ci ./typescript

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Start services for smoke test
        run: docker compose up -d postgres rust
      - name: Wait for /health endpoint
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 3
          done
          echo "Smoke test failed: /health did not respond" >&2
          docker compose logs rust >&2
          exit 1
      - name: Stop services
        if: always()
        run: docker compose down

  deploy:
    name: Deploy (Placeholder)
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Placeholder deploy step
        run: echo "Deploy step is not connected yet. Build + Smoke completed."
