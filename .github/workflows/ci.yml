name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  repo-secret-scan:
    name: Repo Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks against the working tree
        run: |
          set -euo pipefail

          temp_repo="$(mktemp -d)"
          cleanup() {
            rm -rf "${temp_repo}"
          }
          trap cleanup EXIT

          git ls-files -z | rsync -a --files-from=- --from0 ./ "${temp_repo}/"

          docker run --rm \
            -v "${temp_repo}:/repo" \
            -v "${PWD}/.gitleaks.toml:/config/.gitleaks.toml:ro" \
            -v "${PWD}/.gitleaksignore:/config/.gitleaksignore:ro" \
            ghcr.io/gitleaks/gitleaks:v8.24.2 \
            detect \
            --no-git \
            --source /repo \
            --config /config/.gitleaks.toml \
            --gitleaks-ignore-path /config/.gitleaksignore \
            --redact \
            --exit-code 1 \
            --no-banner \
            --no-color \
            --max-target-megabytes 5

  infra-config-scan:
    name: Infra Config Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy misconfiguration scan for infra
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${PWD}:/src" \
            -w /src \
            aquasec/trivy:0.63.0 \
            config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignorefile .trivyignore \
            infra

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
      - name: Terraform format check
        run: make infra-fmt
      - name: Terraform validate
        run: make infra-validate
      - name: GitOps manifest validate
        run: make infra-gitops-validate

  spicedb-runtime:
    name: SpiceDB Runtime Foundation
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy-project
      NEXT_PUBLIC_FIREBASE_APP_ID: ci-dummy-app-id
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-dummy-sender
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
      FIREBASE_PROJECT_ID: ci-dummy-project
      AUTH_ALLOW_POSTGRES_NOTLS: "true"
      SPICEDB_PRESHARED_KEY: linklynx-dev-spicedb-key
    steps:
      - uses: actions/checkout@v4
      - name: Start SpiceDB
        run: docker compose up -d spicedb
      - name: Wait for SpiceDB gRPC/HTTP endpoints
        run: |
          for i in {1..30}; do
            if nc -z 127.0.0.1 50051 && nc -z 127.0.0.1 8443; then
              exit 0
            fi
            sleep 1
          done
          echo "SpiceDB gRPC/HTTP endpoints did not become ready on localhost:50051/8443" >&2
          docker compose logs spicedb >&2
          exit 1
      - name: Check SpiceDB auth and permissions/check contract
        run: |
          set -euo pipefail
          check_payload='{"resource":{"objectType":"guild","objectId":"1"},"permission":"read","subject":{"object":{"objectType":"principal","objectId":"1"}}}'
          curl_with_retry() {
            local output_file="$1"
            local expected_status="$2"
            shift 2
            local status=""

            for attempt in {1..10}; do
              status=$(curl -sS -m 5 -o "${output_file}" -w "%{http_code}" "$@" || true)
              if [ "${status}" = "${expected_status}" ]; then
                return 0
              fi
              sleep 1
            done

            echo "SpiceDB contract check expected ${expected_status} but got ${status}" >&2
            if [ -f "${output_file}" ]; then
              cat "${output_file}" >&2
            fi
            return 1
          }

          curl_with_retry /tmp/spicedb-unauth.json 401 -X POST \
            "http://127.0.0.1:8443/v1/permissions/check" \
            -H "Content-Type: application/json" \
            -d "$check_payload"
          grep -q '"code":16' /tmp/spicedb-unauth.json

          schema_payload='{"schema":"definition principal {}\ndefinition guild {\n  relation member: principal\n  permission read = member\n}"}'
          curl_with_retry /tmp/spicedb-schema-write.json 200 -X POST \
            "http://127.0.0.1:8443/v1/schema/write" \
            -H "Authorization: Bearer ${SPICEDB_PRESHARED_KEY}" \
            -H "Content-Type: application/json" \
            -d "$schema_payload"
          grep -q '"writtenAt"' /tmp/spicedb-schema-write.json

          curl_with_retry /tmp/spicedb-auth.json 200 -X POST \
            "http://127.0.0.1:8443/v1/permissions/check" \
            -H "Authorization: Bearer ${SPICEDB_PRESHARED_KEY}" \
            -H "Content-Type: application/json" \
            -d "$check_payload"
          grep -q '"permissionship":"PERMISSIONSHIP_NO_PERMISSION"' /tmp/spicedb-auth.json
      - name: Stop SpiceDB
        if: always()
        run: docker compose down

  db-schema-check:
    name: DB Schema Check
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy-project
      NEXT_PUBLIC_FIREBASE_APP_ID: ci-dummy-app-id
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-dummy-sender
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
      FIREBASE_PROJECT_ID: ci-dummy-project
      AUTH_ALLOW_POSTGRES_NOTLS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Start Postgres
        run: docker compose up -d postgres
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -h 127.0.0.1 -U postgres -d linklynx >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          docker compose logs postgres >&2
          exit 1
      - name: Apply migrations from SQL files
        run: |
          set -euo pipefail
          find database/postgres/migrations -name '*.up.sql' | sort | while read -r file; do
            echo "Applying ${file}"
            docker compose exec -T postgres psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U postgres -d linklynx < "${file}"
          done
      - name: Run invite join Postgres integration tests
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/linklynx
          AUTH_ALLOW_POSTGRES_NOTLS: "true"
          INVITE_POSTGRES_INTEGRATION: "true"
        run: |
          set -euo pipefail
          cd rust
          cargo test -p linklynx_backend postgres_join_invite_integration_ -- --nocapture
      - name: Check schema snapshot
        env:
          POSTGRES_DUMP_CMD: docker compose exec -T postgres pg_dump -h 127.0.0.1 -U postgres -d linklynx --schema-only --no-owner --no-privileges --exclude-table=_sqlx_migrations
        run: make db-schema-check
      - name: Stop Postgres
        if: always()
        run: docker compose down -v

  message-scylla-integration:
    name: Message Scylla Integration
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy-project
      NEXT_PUBLIC_FIREBASE_APP_ID: ci-dummy-app-id
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-dummy-sender
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
      FIREBASE_PROJECT_ID: ci-dummy-project
      AUTH_ALLOW_POSTGRES_NOTLS: "true"
      DATABASE_URL: postgres://postgres:password@localhost:5432/linklynx
      SCYLLA_HOSTS: 127.0.0.1:9042
      SCYLLA_KEYSPACE: chat
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Start Postgres and Scylla
        run: docker compose up -d postgres scylladb
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -h 127.0.0.1 -U postgres -d linklynx >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          docker compose logs postgres >&2
          exit 1
      - name: Wait for Scylla
        run: |
          for i in {1..30}; do
            if docker compose exec -T scylladb cqlsh -e "SELECT release_version FROM system.local;" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Scylla did not become ready in time" >&2
          docker compose logs scylladb >&2
          exit 1
      - name: Apply Postgres migrations
        run: |
          set -euo pipefail
          find database/postgres/migrations -name '*.up.sql' | sort | while read -r file; do
            echo "Applying ${file}"
            docker compose exec -T postgres psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U postgres -d linklynx < "${file}"
          done
      - name: Apply Scylla schema
        run: make scylla-bootstrap
      - name: Run message Scylla integration tests
        run: make message-scylla-integration
      - name: Stop Postgres and Scylla
        if: always()
        run: docker compose down -v

  typescript-validate:
    name: TypeScript Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: make validate

  rust-validate:
    name: Rust Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: make validate

  authz-spicedb-regression:
    name: AuthZ SpiceDB Regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Run AuthZ regressions with zero-match filter guard
        run: |
          set -euo pipefail

          run_filtered_test() {
            local filter="$1"
            local log_file="/tmp/authz-regression-${filter//[^a-zA-Z0-9_-]/_}.log"
            local executed

            echo "::group::cargo test filter=${filter}"
            cargo test -p linklynx_backend "${filter}" -- --nocapture 2>&1 | tee "${log_file}"
            echo "::endgroup::"

            executed=$(awk '/^running [0-9]+ tests?$/ { sum += $2 } END { print sum + 0 }' "${log_file}")
            if [ "${executed}" -eq 0 ]; then
              echo "::error title=AuthZ CI test filter matched zero tests::filter '${filter}' matched zero tests. Failing to prevent false green."
              if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                echo "- \`${filter}\`: 0 tests (failed)" >> "${GITHUB_STEP_SUMMARY}"
              fi
              exit 1
            fi

            echo "::notice title=AuthZ CI test filter matched::filter '${filter}' executed ${executed} test(s)"
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              echo "- \`${filter}\`: ${executed} tests" >> "${GITHUB_STEP_SUMMARY}"
            fi
          }

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### AuthZ regression filter check"
              echo "- started at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

          run_filtered_test "runtime_provider_spicedb_"
          run_filtered_test "list_guild_channels_returns_forbidden_for_non_member"
          run_filtered_test "invite_dm_moderation_endpoints_apply_role_based_allow_and_deny"
          run_filtered_test "moderation_endpoint_returns_unavailable_when_authz_unavailable"

          run_filtered_test "runtime_provider_unknown_is_fail_closed"
          run_filtered_test "spicedb_runtime_config_"
          run_filtered_test "spicedb_tuple_sync_runtime_config_"

  python-validate:
    name: Python Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: make validate
