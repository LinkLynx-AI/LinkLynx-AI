name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  spicedb-runtime:
    name: SpiceDB Runtime Foundation
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy-project
      NEXT_PUBLIC_FIREBASE_APP_ID: ci-dummy-app-id
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-dummy-sender
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
      FIREBASE_PROJECT_ID: ci-dummy-project
      AUTH_ALLOW_POSTGRES_NOTLS: "true"
      SPICEDB_PRESHARED_KEY: linklynx-dev-spicedb-key
    steps:
      - uses: actions/checkout@v4
      - name: Start SpiceDB
        run: docker compose up -d spicedb
      - name: Wait for SpiceDB gRPC/HTTP endpoints
        run: |
          for i in {1..30}; do
            if nc -z 127.0.0.1 50051 && nc -z 127.0.0.1 8443; then
              exit 0
            fi
            sleep 1
          done
          echo "SpiceDB gRPC/HTTP endpoints did not become ready on localhost:50051/8443" >&2
          docker compose logs spicedb >&2
          exit 1
      - name: Check SpiceDB auth and permissions/check contract
        run: |
          set -euo pipefail
          check_payload='{"resource":{"objectType":"guild","objectId":"1"},"permission":"read","subject":{"object":{"objectType":"principal","objectId":"1"}}}'

          unauth_status=$(curl -sS -o /tmp/spicedb-unauth.json -w "%{http_code}" -X POST \
            "http://127.0.0.1:8443/v1/permissions/check" \
            -H "Content-Type: application/json" \
            -d "$check_payload")
          test "$unauth_status" = "401"
          grep -q '"code":16' /tmp/spicedb-unauth.json

          schema_payload='{"schema":"definition principal {}\ndefinition guild {\n  relation member: principal\n  permission read = member\n}"}'
          schema_status=$(curl -sS -o /tmp/spicedb-schema-write.json -w "%{http_code}" -X POST \
            "http://127.0.0.1:8443/v1/schema/write" \
            -H "Authorization: Bearer ${SPICEDB_PRESHARED_KEY}" \
            -H "Content-Type: application/json" \
            -d "$schema_payload")
          test "$schema_status" = "200"
          grep -q '"writtenAt"' /tmp/spicedb-schema-write.json

          auth_status=$(curl -sS -o /tmp/spicedb-auth.json -w "%{http_code}" -X POST \
            "http://127.0.0.1:8443/v1/permissions/check" \
            -H "Authorization: Bearer ${SPICEDB_PRESHARED_KEY}" \
            -H "Content-Type: application/json" \
            -d "$check_payload")
          test "$auth_status" = "200"
          grep -q '"permissionship":"PERMISSIONSHIP_NO_PERMISSION"' /tmp/spicedb-auth.json
      - name: Stop SpiceDB
        if: always()
        run: docker compose down

  typescript-validate:
    name: TypeScript Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: make validate

  rust-validate:
    name: Rust Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: make validate

  authz-spicedb-regression:
    name: AuthZ SpiceDB Regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Run AuthZ regressions with zero-match filter guard
        run: |
          set -euo pipefail

          run_filtered_test() {
            local filter="$1"
            local log_file="/tmp/authz-regression-${filter//[^a-zA-Z0-9_-]/_}.log"
            local executed

            echo "::group::cargo test filter=${filter}"
            cargo test -p linklynx_backend "${filter}" -- --nocapture 2>&1 | tee "${log_file}"
            echo "::endgroup::"

            executed=$(awk '/^running [0-9]+ tests?$/ { sum += $2 } END { print sum + 0 }' "${log_file}")
            if [ "${executed}" -eq 0 ]; then
              echo "::error title=AuthZ CI test filter matched zero tests::filter '${filter}' matched zero tests. Failing to prevent false green."
              if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                echo "- \`${filter}\`: 0 tests (failed)" >> "${GITHUB_STEP_SUMMARY}"
              fi
              exit 1
            fi

            echo "::notice title=AuthZ CI test filter matched::filter '${filter}' executed ${executed} test(s)"
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              echo "- \`${filter}\`: ${executed} tests" >> "${GITHUB_STEP_SUMMARY}"
            fi
          }

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### AuthZ regression filter check"
              echo "- started at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

          run_filtered_test "runtime_provider_spicedb_"
          run_filtered_test "guild_channel_message_endpoints_apply_role_based_allow_and_deny"
          run_filtered_test "invite_dm_moderation_endpoints_apply_role_based_allow_and_deny"
          run_filtered_test "moderation_endpoint_returns_unavailable_when_authz_unavailable"

          run_filtered_test "runtime_provider_unknown_is_fail_closed"
          run_filtered_test "spicedb_runtime_config_"
          run_filtered_test "spicedb_tuple_sync_runtime_config_"

  python-validate:
    name: Python Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: make validate
