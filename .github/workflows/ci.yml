name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  spicedb-runtime:
    name: SpiceDB Runtime Foundation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start SpiceDB
        run: docker compose up -d spicedb
      - name: Wait for SpiceDB gRPC/HTTP endpoints
        run: |
          for i in {1..30}; do
            if nc -z 127.0.0.1 50051 && nc -z 127.0.0.1 8443; then
              exit 0
            fi
            sleep 1
          done
          echo "SpiceDB gRPC/HTTP endpoints did not become ready on localhost:50051/8443" >&2
          docker compose logs spicedb >&2
          exit 1
      - name: Stop SpiceDB
        if: always()
        run: docker compose down

  typescript-validate:
    name: TypeScript Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: make validate

  rust-validate:
    name: Rust Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: make validate

  python-validate:
    name: Python Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: make validate
