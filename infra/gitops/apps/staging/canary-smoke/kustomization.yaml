apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: api
resources:
  - ../../base/canary-smoke
labels:
  - pairs:
      linklynx.ai/environment: staging
patches:
  - target:
      kind: Rollout
      name: canary-smoke
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
