apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-smoke
  labels:
    app.kubernetes.io/name: canary-smoke
    app.kubernetes.io/part-of: linklynx-platform
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: canary-smoke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canary-smoke
        app.kubernetes.io/part-of: linklynx-platform
    spec:
      serviceAccountName: api-runtime
      containers:
        - name: canary-smoke
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=ok"
            - "-listen=:8080"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  strategy:
    canary:
      stableService: canary-smoke-stable
      canaryService: canary-smoke-canary
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 10
        - pause:
            duration: 60s
        - setWeight: 50
        - pause:
            duration: 120s
        - setWeight: 100
