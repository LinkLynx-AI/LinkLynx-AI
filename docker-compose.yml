services:
  # Next.js Frontend
  typescript:
    build:
      context: ./typescript
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://rust:8080
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:?NEXT_PUBLIC_FIREBASE_API_KEY is required}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:?NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN is required}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:?NEXT_PUBLIC_FIREBASE_PROJECT_ID is required}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:?NEXT_PUBLIC_FIREBASE_APP_ID is required}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:?NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID is required}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:?NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET is required}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://rust:8080
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:?NEXT_PUBLIC_FIREBASE_API_KEY is required}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:?NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN is required}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:?NEXT_PUBLIC_FIREBASE_PROJECT_ID is required}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:?NEXT_PUBLIC_FIREBASE_APP_ID is required}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:?NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID is required}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:?NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET is required}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - rust
    networks:
      - linklynx-network

  # Rust Backend (Axum)
  rust:
    build:
      context: ./rust
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./database/scylla:/app/database/scylla:ro
    environment:
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:?FIREBASE_PROJECT_ID is required}
      DATABASE_URL: postgres://postgres:password@postgres:5432/linklynx
      AUTH_ALLOW_POSTGRES_NOTLS: ${AUTH_ALLOW_POSTGRES_NOTLS:?AUTH_ALLOW_POSTGRES_NOTLS is required}
      AUTHZ_PROVIDER: ${AUTHZ_PROVIDER:-noop}
      AUTHZ_ALLOW_ALL_UNTIL: ${AUTHZ_ALLOW_ALL_UNTIL:-2026-06-30}
      SPICEDB_ENDPOINT: ${SPICEDB_ENDPOINT:-http://spicedb:50051}
      SPICEDB_CHECK_ENDPOINT: ${SPICEDB_CHECK_ENDPOINT:-http://spicedb:8443}
      SPICEDB_PRESHARED_KEY: ${SPICEDB_PRESHARED_KEY:-linklynx-dev-spicedb-key}
      SPICEDB_REQUEST_TIMEOUT_MS: ${SPICEDB_REQUEST_TIMEOUT_MS:-1000}
      SPICEDB_CHECK_MAX_RETRIES: ${SPICEDB_CHECK_MAX_RETRIES:-1}
      SPICEDB_CHECK_RETRY_BACKOFF_MS: ${SPICEDB_CHECK_RETRY_BACKOFF_MS:-100}
      AUTHZ_CACHE_ALLOW_TTL_MS: ${AUTHZ_CACHE_ALLOW_TTL_MS:-5000}
      AUTHZ_CACHE_DENY_TTL_MS: ${AUTHZ_CACHE_DENY_TTL_MS:-1000}
      SPICEDB_POLICY_VERSION: ${SPICEDB_POLICY_VERSION:-lin862-v1}
      SPICEDB_SCHEMA_PATH: ${SPICEDB_SCHEMA_PATH:-database/contracts/lin862_spicedb_namespace_relation_permission_contract.md}
      SCYLLA_HOSTS: scylladb:9042
      SCYLLA_KEYSPACE: ${SCYLLA_KEYSPACE:-chat}
      SCYLLA_SCHEMA_PATH: ${SCYLLA_SCHEMA_PATH:-database/scylla/001_lin139_messages.cql}
      SCYLLA_REQUEST_TIMEOUT_MS: ${SCYLLA_REQUEST_TIMEOUT_MS:-1000}
      RUST_LOG: ${RUST_LOG:-info}
      WS_REAUTH_GRACE_SECONDS: ${WS_REAUTH_GRACE_SECONDS:-30}
      WS_TICKET_TTL_SECONDS: ${WS_TICKET_TTL_SECONDS:-60}
      AUTH_IDENTIFY_TIMEOUT_SECONDS: ${AUTH_IDENTIFY_TIMEOUT_SECONDS:-5}
      WS_TICKET_RATE_LIMIT_MAX_PER_MINUTE: ${WS_TICKET_RATE_LIMIT_MAX_PER_MINUTE:-20}
      WS_IDENTIFY_RATE_LIMIT_MAX_PER_MINUTE: ${WS_IDENTIFY_RATE_LIMIT_MAX_PER_MINUTE:-60}
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      postgres:
        condition: service_healthy
      spicedb:
        condition: service_started
      scylladb:
        condition: service_started
    networks:
      - linklynx-network

  # Python Service
  python:
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - linklynx-network

  # Elixir Service
  elixir:
    build:
      context: ./elixir
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PHX_HOST=localhost
      - PORT=4000
    networks:
      - linklynx-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=linklynx
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - linklynx-network

  # SpiceDB (AuthZ runtime foundation)
  spicedb:
    image: authzed/spicedb:v1.49.2@sha256:b3ff822f5bd583d5a7e91753b6d2958f1ceb0c79113f5228c8e66f7a29e6da7d
    command:
      - serve
      - --http-enabled
      - --grpc-preshared-key=${SPICEDB_PRESHARED_KEY:-linklynx-dev-spicedb-key}
      - --datastore-engine=memory
      - --grpc-addr=:50051
      - --http-addr=:8443
    ports:
      - "50051:50051"
      - "8443:8443"
    networks:
      - linklynx-network

  # ScyllaDB (NoSQL for chat messages)
  scylladb:
    image: scylladb/scylla:5.4
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 512M
    networks:
      - linklynx-network

volumes:
  postgres_data:
  scylla_data:

networks:
  linklynx-network:
    driver: bridge
